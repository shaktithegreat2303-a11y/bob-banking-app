{% extends "base.html" %}
{% block title %}Deposit — SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-6 col-lg-5">

    <div class="card shadow-sm mt-2">
      <div class="card-header bg-success text-white text-center py-3">
        <h4 class="mb-0 fw-semibold">⬆ Deposit Funds</h4>
      </div>

      <div class="card-body p-4">
        <p class="text-muted mb-4">
          Enter the amount you would like to deposit into your account.
          Funds are credited immediately.
        </p>

        <form method="POST" action="{{ url_for('deposit') }}" novalidate>

          <div class="mb-4">
            <label for="amount" class="form-label fw-medium">Amount ($)</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input
                type="number"
                id="amount"
                name="amount"
                class="form-control form-control-lg"
                placeholder="0.00"
                min="0.01"
                step="0.01"
                required
                autofocus
              />
            </div>
            <div class="form-text">Minimum deposit: $0.01</div>
          </div>

          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-success btn-lg">
              Confirm Deposit
            </button>
          </div>

        </form>

        <div class="text-center">
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-sm">
            ← Back to Dashboard
          </a>
        </div>

      </div><!-- /card-body -->
    </div><!-- /card -->

  </div><!-- /col -->
</div><!-- /row -->
{% endblock %}
