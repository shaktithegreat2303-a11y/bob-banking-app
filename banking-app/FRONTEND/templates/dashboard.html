{% extends "base.html" %}
{% block title %}Dashboard — SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">

    <!-- Welcome heading -->
    <h2 class="mb-4 fw-semibold text-primary">
      Welcome, {{ customer_name }}
    </h2>

    <!-- Balance card -->
    <div class="card shadow-sm mb-4">
      <div class="card-body text-center py-5">
        <p class="text-muted mb-1" style="font-size:0.9rem; letter-spacing:0.05em; text-transform:uppercase;">
          Current Balance
        </p>
        <h1 class="display-4 fw-bold text-success mb-0">
          ${{ "{:,.2f}".format(balance) }}
        </h1>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="d-grid gap-3">

      <a href="{{ url_for('deposit') }}" class="btn btn-success btn-lg">
        ⬆ Deposit Funds
      </a>

      <a href="{{ url_for('withdraw') }}" class="btn btn-warning btn-lg text-dark">
        ⬇ Withdraw Funds
      </a>

      <!-- Logout uses POST to prevent accidental logouts via browser prefetch -->
      <form method="POST" action="{{ url_for('logout') }}">
        <div class="d-grid">
          <button type="submit" class="btn btn-outline-danger btn-lg">
            ⏻ Logout
          </button>
        </div>
      </form>

    </div><!-- /d-grid -->

  </div><!-- /col -->
</div><!-- /row -->
{% endblock %}
